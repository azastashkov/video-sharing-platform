services:
  # --- Infrastructure ---
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api-server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videouser -d videodb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/original-storage --ignore-existing;
      mc mb local/transcoded-storage --ignore-existing;
      exit 0;
      "

  # --- Application Services ---
  api-server-1:
    build: ./api-server
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-server-2:
    build: ./api-server
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  transcoding-worker-1:
    build: ./transcoding-worker
    environment:
      RABBITMQ_HOST: rabbitmq
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  transcoding-worker-2:
    build: ./transcoding-worker
    environment:
      RABBITMQ_HOST: rabbitmq
      MINIO_HOST: minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  completion-handler-1:
    build: ./completion-handler
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  completion-handler-2:
    build: ./completion-handler
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Load Balancer ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-server-1:
        condition: service_healthy
      api-server-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Monitoring ---
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-server-1
      - api-server-2
      - transcoding-worker-1
      - transcoding-worker-2
      - completion-handler-1
      - completion-handler-2

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # --- Load Test (profile: test) ---
  load-client:
    build: ./load-client
    profiles:
      - test
    volumes:
      - ./video:/videos:ro
    environment:
      API_BASE_URL: http://nginx
      VIDEO_DIR: /videos
    depends_on:
      nginx:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
